name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/vbarrai/parcai/archive/refs/tags/v${VERSION}.tar.gz"

          # Download tarball and compute SHA256
          SHA256=$(curl -sSL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)

          # Clone homebrew-tap
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vbarrai/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Update formula
          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/parcai.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/parcai.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/parcai.rb
          git commit -m "Update parcai to v${VERSION}"
          git push
